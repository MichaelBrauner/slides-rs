<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presenter View</title>
  <link rel="stylesheet" href="assets/presenter.css">
</head>
<body>
  <div class="current-slide">
    <iframe id="currentFrame" src="slide-1.html"></iframe>
  </div>

  <div class="sidebar">
    <div class="next-preview">
      <h3>Next Slide</h3>
      <img id="nextThumb" src="thumbnails/slide-2.png" alt="Next slide">
    </div>

    <div class="notes">
      <h3>Speaker Notes</h3>
      <div class="notes-content" id="notesContent">
        Loading notes...
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="timer" id="timer">00:00:00</div>

    <div class="slide-info">
      Slide <span id="currentNum">1</span> / <span id="totalNum">{{ app.total }}</span>
    </div>

    <div class="nav-buttons">
      <button onclick="prevSlide()">← Prev</button>
      <button onclick="nextSlide()">Next →</button>
    </div>
  </div>

  <script>
    let currentSlide = 1;
    const totalSlides = {{ app.total }};
    let startTime = Date.now();

    // Speaker notes embedded at build time (works with file:// URLs)
    const allNotes = {{ notes | safe }};

    // Timer
    setInterval(() => {
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const h = String(Math.floor(elapsed / 3600)).padStart(2, '0');
      const m = String(Math.floor((elapsed % 3600) / 60)).padStart(2, '0');
      const s = String(elapsed % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `${h}:${m}:${s}`;
    }, 1000);

    // Get slide from URL param
    const params = new URLSearchParams(window.location.search);
    if (params.has('slide')) {
      currentSlide = parseInt(params.get('slide')) || 1;
    }
    updateSlides();

    function updateSlides() {
      document.getElementById('currentFrame').src = `slide-${currentSlide}.html`;
      document.getElementById('currentNum').textContent = currentSlide;

      // Update next slide thumbnail
      const nextThumb = document.getElementById('nextThumb');
      if (currentSlide < totalSlides) {
        nextThumb.src = `thumbnails/slide-${currentSlide + 1}.png`;
        nextThumb.style.display = 'block';
      } else {
        nextThumb.style.display = 'none';
      }

      // Update URL
      history.replaceState(null, '', `presenter.html?slide=${currentSlide}`);

      // Load notes from embedded data (0-indexed array)
      const notes = allNotes[currentSlide - 1] || '';
      document.getElementById('notesContent').innerHTML =
        notes ? notes : '<em>No notes for this slide</em>';
    }

    function nextSlide() {
      if (currentSlide < totalSlides) {
        currentSlide++;
        updateSlides();
      }
    }

    function prevSlide() {
      if (currentSlide > 1) {
        currentSlide--;
        updateSlides();
      }
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'j' || e.key === ' ') nextSlide();
      if (e.key === 'ArrowLeft' || e.key === 'k') prevSlide();
      if (e.key === 'Home') { currentSlide = 1; updateSlides(); }
      if (e.key === 'End') { currentSlide = totalSlides; updateSlides(); }
      if (e.key === 'o') window.location.href = 'overview.html';
      if (e.key === 'Escape') window.location.href = `slide-${currentSlide}.html`;
    });
  </script>
</body>
</html>
